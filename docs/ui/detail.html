<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>칼로리 앱 - 상세 정보 UI</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <h1>음식 상세 정보</h1>
    <p>프리미엄 안드로이드 네이티브 앱 목업</p>
    <div style="margin-top: 20px; display: flex; gap: 10px; justify-content: center;">
      <a href="dashboard.html" style="color: var(--text-muted);">홈</a>
      <a href="detail.html" style="color: var(--primary);">상세정보</a>
      <a href="recipes.html" style="color: var(--text-muted);">레시피</a>
      <a href="create.html" style="color: var(--text-muted);">직접등록</a>
    </div>
  </header>
  
  <main>
    <div class="device">
      <div class="screen">
        <div class="row">
          <span style="font-size: 1.5rem;">←</span>
          <span style="color: var(--primary);">저장하기</span>
        </div>
        
        <img src="https://images.unsplash.com/photo-1546069901-ba9599a7e63c?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80" alt="음식 사진" class="hero-img" style="margin-top: 20px;">
        
        <div class="badge">✨ AI 인식 성공</div>
        <h2>아보카도 샐러드 볼</h2>
        <div class="kcal-text">320 kcal</div>
        <p style="color: var(--text-muted);">AI 신뢰도: 98% • 예상 중량: 300g</p>
        
        <h3 style="margin-top: 30px;">감지된 재료 목록</h3>
        <div class="glass-card" style="padding: 15px;">
          <div class="row" style="margin: 0;">
            <span>아보카도 (100g)</span>
            <span>160 kcal</span>
          </div>
        </div>
        <div class="glass-card" style="padding: 15px;">
          <div class="row" style="margin: 0;">
            <span>혼합 샐러드 채소 (150g)</span>
            <span>35 kcal</span>
          </div>
        </div>
      </div>
    </div>
  </main>
</body>
</html>
