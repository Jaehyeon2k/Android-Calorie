<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>칼로리 앱 - 직접 등록 UI</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <h1>나만의 요리 등록</h1>
    <p>프리미엄 안드로이드 네이티브 앱 목업</p>
    <div style="margin-top: 20px; display: flex; gap: 10px; justify-content: center;">
      <a href="dashboard.html" style="color: var(--text-muted);">홈</a>
      <a href="detail.html" style="color: var(--text-muted);">상세정보</a>
      <a href="recipes.html" style="color: var(--text-muted);">레시피</a>
      <a href="create.html" style="color: var(--primary);">직접등록</a>
    </div>
  </header>
  
  <main>
    <div class="device">
      <div class="screen">
        <h2>수동 레시피 입력</h2>
        <p style="color: var(--text-muted);">재료를 입력하면 총 칼로리를 자동 계산해줍니다!</p>
        
        <input type="text" placeholder="요리 이름 (예: 특제 계란 볶음밥)" value="특제 계란 볶음밥">
        <input type="number" placeholder="총 중량 (g)" value="350">
        
        <div class="glass-card">
          <h3>재료 합산 계산기</h3>
          <div class="row" style="margin: 10px 0 0;">
            <span style="color: var(--text-muted);">밥 (210g)</span>
            <span>305 kcal</span>
          </div>
          <div class="row" style="margin: 5px 0 0;">
            <span style="color: var(--text-muted);">계란 (100g)</span>
            <span>155 kcal</span>
          </div>
          <div class="row" style="margin: 10px 0 0; padding-top: 10px; border-top: 1px solid var(--glass-border);">
            <strong>자동 계산된 총 칼로리</strong>
            <strong style="color: var(--primary);">460 kcal</strong>
          </div>
        </div>
        
        <button class="button button-outline" style="margin-bottom: 15px;">+ 재료 추가하기</button>
        <button class="button">음식 사전 완성하기</button>
      </div>
    </div>
  </main>
</body>
</html>
