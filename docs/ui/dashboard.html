<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>칼로리 앱 - 홈 화면 UI</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <h1>홈 화면</h1>
    <p>프리미엄 안드로이드 네이티브 앱 목업</p>
    <div style="margin-top: 20px; display: flex; gap: 10px; justify-content: center;">
      <a href="dashboard.html" style="color: var(--primary);">홈</a>
      <a href="detail.html" style="color: var(--text-muted);">상세정보</a>
      <a href="recipes.html" style="color: var(--text-muted);">레시피</a>
      <a href="create.html" style="color: var(--text-muted);">직접등록</a>
    </div>
  </header>
  
  <main>
    <div class="device">
      <div class="screen">
        <div class="row">
          <h2>대시보드</h2>
          <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Felix" width="40" height="40" style="border-radius: 20px; background: #fff;">
        </div>
        <p class="badge">오늘의 섭취량</p>
        <div class="kcal-text">1,450 kcal</div>
        <p style="color: var(--text-muted); margin-bottom: 30px;">남은 목표량: 550 kcal</p>
        
        <h3>최근 등록한 음식</h3>
        <div class="glass-card">
          <div class="row" style="margin: 0;">
            <div>
              <h3>연어 스테이크</h3>
              <p style="color: var(--text-muted); margin: 5px 0 0;">250g • 직접 등록함</p>
            </div>
            <div style="font-weight: 600; font-size: 1.2rem;">420 kcal</div>
          </div>
        </div>
        <div class="glass-card">
          <div class="row" style="margin: 0;">
            <div>
              <h3>그릴드 닭가슴살 샐러드</h3>
              <p style="color: var(--text-muted); margin: 5px 0 0;">300g • AI 인식됨</p>
            </div>
            <div style="font-weight: 600; font-size: 1.2rem;">320 kcal</div>
          </div>
        </div>
        
        <button class="button" style="margin-top: 20px;">📷 음식 사진 촬영 (AI 인식)</button>
      </div>
    </div>
  </main>
</body>
</html>
